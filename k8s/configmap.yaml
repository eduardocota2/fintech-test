apiVersion: v1
kind: ConfigMap
metadata:
  name: fintech-config
  namespace: fintech
data:
  APP_NAME: "Fintech Backend"
  APP_VERSION: "1.0.0"
  API_V1_PREFIX: "/api/v1"
  APP_ENV: "development"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRE_MINUTES: "60"
  WEBHOOK_TIMEOUT_SECONDS: "5.0"
  WORKER_POLL_SECONDS: "1.0"
  SSE_POLL_SECONDS: "1.0"
  APPLICATIONS_LIST_CACHE_TTL_SECONDS: "30"
  ENABLE_DEBUG_DEBT_HEADER: "true"
  POSTGRES_DB: "fintech"
  POSTGRES_USER: "postgres"
  REDIS_URL: "redis://redis:6379/0"
  WEBHOOK_TARGET_URL: "http://api:8000/api/v1/webhooks/mock-receiver"
